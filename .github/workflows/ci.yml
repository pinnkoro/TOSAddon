name: CI

# 配布物を壊す種類の事故を機械的に止める。従来は手元で気付くしかなく、release まで
# 素通りしていた。検査は 3 段構えで、走るタイミングを変えている。
#
# bundle ジョブ（main / release の両方で毎回）
#   1. src と golden sha の食い違い    … src を触ったのに --bless し忘れた / CRLF 混入
#   2. manifest 未登録の src ファイル  … ビルドから黙って脱落する
#   3. 連結後の Lua 構文エラー         … 分割ソース単体では気付けない結合バグ
#   3'. core のロジック回帰            … ゲーム API をスタブ化して動かせる範囲のみ
#   3''. .ipf 暗号化の復号照合         … 自前実装(docs/ipf_crypt.py)が壊れると
#        クライアントが読めない .ipf を配ることになる
#
# version-freeze ジョブ（main への PR で毎回）
#   6. リリース前の先行採番            … main だけ版数が上がると、アドオンマネージャーが
#      main の addons.json から組み立てたアセット名（nexus_addons_p-<fileVersion>.ipf）が
#      Release 側に存在せず、公開までの間だれもインストール／更新できなくなる（実害あり）。
#      採番は release-prep/** ブランチでのみ許し、直後に main -> release を出す運用にする。
#
# ipf ジョブ（release 経路と release-prep/** の PR）
#   4. .ipf の中身が現 src と食い違う  … src を直して .ipf を再ビルドし忘れた
#   5. バージョンの三者不一致          … ver / fileVersion / .ipf ファイル名
#   通常の main の PR では .ipf を作り直さない運用なので、4/5 を毎回回すと恒常的に
#   赤くなる。採番を行う経路（release-prep/** と release）でだけ効かせる。

on:
  pull_request:
    branches: [main, release]
  push:
    branches: [main, release]
  workflow_dispatch: {}

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # --check は既存 bundle の有無に依存せず、src の連結結果だけを検証する。
      # manifest 未登録ファイルの検出もここで走る(build() 内)。
      - name: bundle の再現性を検証 (golden sha / manifest 脱落)
        run: python3 docs/bundle_from_src.py --check

      # 構文チェックは連結後の bundle に対して行う。src 単体では guard_open.lua が
      # `if ... then` を開いたまま終わるなど、ファイル単位では構文的に不完全なため。
      - name: bundle を生成
        run: python3 docs/bundle_from_src.py

      - name: LuaJIT を用意
        run: sudo apt-get update && sudo apt-get install -y luajit

      # ToS クライアントは LuaJIT(5.1) 系。loadfile はロードのみで実行はしないので、
      # ゲーム API が無い環境でも構文エラーだけを確実に検出できる。
      # 手元でも同じものを流せるようスクリプトに出してある。
      - name: bundle の Lua 構文チェック
        run: sh docs/tests/syntax_check.sh

      # ゲーム API をスタブに差し替えて動かせる範囲の回帰テスト。
      # 実機でしか確認できない箇所を壊しても気付けないため、最低限だけ機械で見る。
      - name: core のロジックテスト
        run: luajit docs/tests/test_core.lua

      # 利用者の記録(討伐数・滞在時間)を消す変更は実機だと手遅れになってから気付くので、
      # 「壊さない」性質だけは機械で見る。
      - name: monster_kill_count のロジックテスト
        run: luajit docs/tests/test_monster_kill_count.lua

      # .ipf の暗号化は Python 実装（docs/ipf_crypt.py）に置き換えてある。実際に配布した
      # .ipf を復号し、raw deflate 展開してテーブル記載の平文 CRC32 と一致するかを見る
      # （テーブルは暗号化されないので、暗号実装を経由しない独立オラクルになる）。
      # ここが壊れると「ビルドは通るのにクライアントが読めない .ipf」を配ることになり、
      # 実機に入れるまで気付けない。
      # 往復（復号 → 再暗号化）は鍵の回し方が同じである限り必ず成立する恒等式で、
      # 単体では暗号の検査にならない。検出力はあくまで CRC32 照合の側にある。
      - name: .ipf 暗号化の検証
        run: python3 docs/ipf_crypt.py --self-test

  # main への PR で「バージョン情報を先に上げていないか」だけを見る。
  #
  # main の required status check にするため、条件付きスキップ（job 単位の if）は使わず
  # 常に走らせて必ず報告させる。PR 以外（push / workflow_dispatch）は比較相手が無いので
  # ステップ側で素通りする（ジョブとしては成功で報告される）。
  version-freeze:
    runs-on: ubuntu-latest
    steps:
      # merge-base を取るので浅いチェックアウトでは足りない。
      - uses: actions/checkout@v7
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0

      # base ブランチの先端ではなく merge-base と比較する（理由はスクリプトの docstring）。
      # checkout は PR のマージコミットを見ているだけなので、base の枝は明示的に取る。
      # ブランチ名は ${{ }} で直に埋めず env 経由で渡す（run への式展開はコマンド注入面）。
      - name: base ブランチを取得
        if: github.event_name == 'pull_request'
        env:
          BASE_BRANCH: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin \
            "+refs/heads/${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}"

      - name: リリース前の先行採番を検出
        if: github.event_name == 'pull_request'
        env:
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 docs/check_version_freeze.py \
            --base "origin/${BASE_BRANCH}" \
            --head "$HEAD_SHA" \
            --base-branch "$BASE_BRANCH" \
            --head-branch "$HEAD_BRANCH"

  # 採番が行われる経路でのみ。main -> release の PR で base_ref が release、
  # マージ後の push で ref が refs/heads/release になる。release ブランチ上で
  # workflow_dispatch した場合も ref が一致するので手動再実行できる。
  # 採番は release-prep/** の PR（-> main）で行うので、そこでも同じ検査を通す。
  # main に入る前に落とせれば、release への PR で初めて気付くより手戻りが小さい。
  ipf:
    if: github.base_ref == 'release' || github.ref == 'refs/heads/release' || startsWith(github.head_ref, 'release-prep/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # .ipf は暗号化バイナリだが、末尾のファイルテーブルは平文で、各ファイルの
      # 平文 CRC32 と byte 数を持つ。復号せずに「中身が現 src と同じか」を判定できる。
      # 併せて ver / fileVersion / .ipf ファイル名の三者一致も見る。
      - name: .ipf が現 src から作られたものかを検証
        run: python3 docs/verify_ipf.py
